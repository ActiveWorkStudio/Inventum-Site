name: Deploy to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          cat <<'EOF' > ~/.ssh/config
          Host vps-deploy
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USER }}
            Port ${{ secrets.VPS_PORT }}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: SSH smoke test
        run: |
          ssh -vvv vps-deploy "echo 'SSH login success'"

      - name: Deploy files
        run: |
          rsync -rlvz --delete \
            --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            --exclude ".git" \
            --exclude ".github" \
            -e "ssh" \
            ./ vps-deploy:/var/www/inventum_site/

      - name: Reload Nginx
        run: |
          ssh vps-deploy "sudo -n /usr/bin/systemctl reload nginx"
